template:
  path: templates/[다비오] 회사소개자료.pptx
  slide_size:
    width_in: 13.333
    height_in: 7.5

  # 챕터 구조 (LLM vision 분석 결과) — layout 이름의 번호·이름에서 추출.
  # 빌더가 slide의 장번호 → chapters[N].layout_default 의 견본을 사용.
  # 그러면 좌상단·우상단 챕터 라벨이 *자동으로 일치*.
  chapters:
    1: { name: '회사 소개',         intro_slide: 2 }
    2: { name: '시장 현황',         intro_slide: 8 }
    3: { name: '핵심 기술 및 제품', intro_slide: 11 }
    4: { name: '비즈니스 현황',     intro_slide: 33 }
    5: { name: '사업성장전략',      intro_slide: null }   # 견본에 별도 간지 없음
    6: { name: 'Appendix',           intro_slide: null }

  layouts:
    표지: 1            # 공통
    목차: null
    감사: 41           # 공통
    회사소개: 3        # 공통 (chapter 1에 한 번만 등장)
    # *간지는 챕터별*로 별도 디자인. 빌더가 콘텐츠 장번호 → 매핑 정책 따라 견본 선택.
    # 회사소개자료는 4개 챕터에 간지 디자인 있음:
    #   slide 2  = "01. 회사 소개"
    #   slide 8  = "02. 시장 현황"
    #   slide 11 = "03. 핵심 기술 및 제품"
    #   slide 33 = "04. 비즈니스 현황"
    간지:
      1: 2
      2: 8
      3: 11
      4: 33
    # 본문은 챕터별 + 시각요소 변종 (회사소개자료는 챕터마다 본문 디자인 다름)
    본문:
      1: { 기본: 5 }
      2: { 기본: 9 }
      3: { 기본: 12, 이미지: 15 }
      4: { 기본: 34 }
    결론:
      1: { 기본: 5 }
      2: { 기본: 9 }
      3: { 기본: 12 }
      4: { 기본: 34 }
    부록:
      1: { 기본: 12 }
      2: { 기본: 12 }
      3: { 기본: 12 }
      4: { 기본: 12 }

# 콘텐츠 장번호 → template 견본 챕터 매핑 정책
# 회사소개자료는 4개 챕터 간지 견본. 콘텐츠가 5개 챕터면 5번째는 마지막 견본 (last_repeat) 사용.
chapter_mapping_policy:
  type: last_repeat   # 1to1 | cycle | last_repeat | manual

# 간지 견본의 *통합 디자인 텍스트 포맷*.
# 회사소개자료의 간지는 "02.\n시장 현황" 형태로 좌측 단일 shape에 통합되어 있음.
# 빌더는 title slot에 *이 포맷*으로 박는다.
