# 회사 재무 KB 표준 스키마 (정본)
#
# 회사별 KB 의 `kb/company/<name>/finance.yaml` 가 *이 스키마*를 따른다.
# 빌더(proposal-writer)는 양식 셀 라벨 → templates/finance_label_map.yaml
# → 이 스키마의 *필드 이름*으로 lookup → finance.yaml 값 가져와 채움.
#
# 일반화 원칙:
#  - 회사 식별자, RFP 식별자, 양식 식별자 0개.
#  - 추가 회사 KB는 *같은 스키마*로 yaml 1개만 추가하면 즉시 동작.
#  - 양식 라벨이 표준어 아니어도 finance_label_map.yaml 동의어로 흡수.
#
# 단위 정책:
#  - 값은 *원* 단위 정수로 저장 (변환 모호성 제거).
#  - 빌더가 양식 셀의 단위 표기('백만원'·'억원'·'천원') 보고 자동 변환.
#  - 단위 미표기 셀 → 빌더 default('백만원') 사용 + 사용자 경고.
#
# 출처·작성일은 *항상* 명시 (감사보고서 / 내부 결산 / 공시 등).

schema_version: 1

# === 핵심 필드 (사용자 결정: 핵심만) ===
# 양식이 보통 요구하는 7개 + 연도 차원.
required_fields:
  # 재무상태표 (BS)
  - capital                   # 자본금 (납입자본금)
  - total_assets              # 자산총계
  - total_liabilities         # 부채총계
  - total_equity              # 자본총계
  # 손익계산서 (IS)
  - revenue                   # 매출액
  - operating_income          # 영업이익
  - net_income                # 당기순이익

# 각 필드는 연도별로 저장. 보통 최근 3년 (RFP 표준 요구).
# 필드별 의미 + 한국어 라벨 (사용자 검토용).
field_definitions:
  capital:
    ko: 자본금
    description: 납입자본금 (보통주 + 우선주 액면가 합)
    bs_section: 자본
  total_assets:
    ko: 자산총계
    description: 유동자산 + 비유동자산
    bs_section: 자산
  total_liabilities:
    ko: 부채총계
    description: 유동부채 + 비유동부채
    bs_section: 부채
  total_equity:
    ko: 자본총계
    description: 자본금 + 자본잉여금 + 이익잉여금 + 기타
    bs_section: 자본
  revenue:
    ko: 매출액
    description: 매출액 (영업수익 포함)
    is_section: 매출
  operating_income:
    ko: 영업이익
    description: 매출총이익 - 판관비
    is_section: 손익
  net_income:
    ko: 당기순이익
    description: 법인세 차감 후 당기순손익
    is_section: 손익

# === 회사별 yaml 작성 예시 (kb/company/<name>/finance.yaml) ===
# 실제 회사 KB는 이 example_schema 의 records 부분을 채워서 사용.
example_schema:
  meta:
    company_name: 주식회사 다비오
    business_no: 105-87-68437     # 사업자등록번호 (식별)
    fiscal_year_end: '12-31'      # 회계연도 종료 (월-일)
    currency: KRW
    audit_status: external_audit  # external_audit / internal / unaudited
    source: 감사보고서 2024 (회계법인 XXX, 2025-03-20)
    last_updated: '2025-03-31'
  # records: 연도(YYYY)별 dict. 값은 *원* 단위 정수.
  records:
    '2024':
      capital: 1000000000              # 10억
      total_assets: 50000000000        # 500억
      total_liabilities: 20000000000   # 200억
      total_equity: 30000000000        # 300억
      revenue: 80000000000             # 800억
      operating_income: 5000000000     # 50억
      net_income: 3000000000           # 30억
    '2023':
      capital: 1000000000
      total_assets: 42000000000
      # ... (필드 누락 가능 — 빌더는 누락 시 '확인 필요' 표기)
    '2022':
      capital: 800000000
      # ...

# === 빌더 동작 규칙 ===
# 1. 양식 셀 라벨 → finance_label_map.yaml 로 필드명 식별
# 2. records[연도][필드] 값 가져옴
# 3. 양식 단위 표기 보고 변환 (백만원 = ÷1,000,000 / 억원 = ÷100,000,000)
# 4. 데이터 없으면 '(확인 필요)' 텍스트 (추측 금지)
# 5. 최근 N개년 요구 시 records 키 정렬해서 가장 최근 N개
