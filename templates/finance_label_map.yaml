# 양식 셀 라벨 ↔ finance_schema 필드 매핑 (정본)
#
# 임의의 한국 RFP·양식이 *같은 재무 정보*를 다양한 표기로 묻는다.
# 빌더는 양식 셀의 라벨 텍스트를 *normalize* (공백/조사/괄호 제거) 후 이 dict 에서 lookup.
# 매칭 없으면 *해당 셀 재무 채움 안 함* (양식 일반 셀로 처리).
#
# 일반화 원칙:
#  - 회사 식별자 0, 양식 식별자 0.
#  - 새 동의어는 *이 yaml 에만* 추가 — 코드 수정 0.
#  - 키워드 부분 매칭 (substring) — 양식의 "최근 3년 매출액(백만원)" → 'revenue' 매칭.
#
# 매칭 우선순위:
#  1. exact_labels (정확 일치) — 우선
#  2. keywords (부분 포함) — 다음
#  3. 매칭 없음 → 일반 셀

schema_version: 1

# === 도메인 가정 ===
# 현재 yaml 은 *한국 공공 RFP* 도메인 기준 (단위 백만원·억원, 한국어 회계 용어).
# 다른 도메인(글로벌 영문 RFP·USD/EUR 단위) 까지 일반화하려면:
#   - unit_patterns 에 'million USD', 'M EUR' 등 추가
#   - fields[*].keywords 에 영문 추가 (Total Assets, Net Income 이미 일부 있음)
#   - 새 도메인용 yaml 별도 작성도 가능 (templates/finance_label_map_global.yaml 등)

# 합계/총계 행 식별 키워드 — extract_finance.py 가 점수 가산
# (항목 행 < 합계 행 선택). 일반화: 새 표기 ('Sum', '소계' 등) 여기 추가.
total_row_keywords:
  - 합계
  - 총계
  - 총액
  - Total
  - Sum

# === 표지·메타 셀 라벨 (extract_finance.py 가 인식) ===
# 표지·헤더 셀의 *어떤 키워드 다음 셀이 회사명/단위인지* 정본.
# 한국·영문 혼합. 새 표기 (Issuer, Issued by, Currency 등) 여기 추가.
meta_labels:
  company_name:
    - 회사명
    - 상호
    - 법인명
    - Company
    - Company Name
    - Entity
    - Issuer
  currency_unit:
    - 단위
    - 통화
    - Unit
    - Currency
    - Denomination

# 양식 라벨에서 *제거하고 매칭*할 잡음 (조사/단위 표기/괄호)
normalize:
  strip_chars: ['(', ')', '[', ']', '※', '*', ':', ',']
  strip_units: ['백만원', '천원', '억원', '원', '백만', '천', '억', 'KRW']
  strip_words: ['최근', '당기', '전기', '전전기', '직전', '년도', '연도', '기준']
  # 연도 표기 (2022·'24·24년 등) → 별도 처리 (year_extract)
  # 빌더가 라벨에서 연도 추출 후 records[year] 조회
  # 회계 양식의 *prefix 패턴* 제거 (예: 'Ⅰ. 자산', 'I. Assets' 등). 정규식 list.
  strip_prefix_patterns:
    - '^[ⅠⅡⅢⅣⅤⅥⅦⅧⅨⅩ]+\.\s*'   # 한국 회계 표준: 로마숫자 + 점
    - '^[IVX]+\.\s+'                # 영문 회계: I./II./III. + 공백 (한 글자 영문자는 너무 광범위)

# === 정규식 패턴 (yaml 정본) ===
# 코드에 정규식 박지 않음. 새 도메인은 *yaml만* 수정.
patterns:
  # 연도 라벨 — 양식 헤더 셀에서 추출 ('2024' '2024년' 'FY2024' "'24년" '~24년').
  # 4자리(\d{4}) 또는 2자리(\d{2}) 매칭. 2자리는 *year_2digit_prefix* (yaml) 로 4자리 변환.
  # 한국 양식 관행: ~'24년 형식 (2024년까지). 임의 양식의 2자리 표기 일반 흡수.
  year_label: '(\d{4}|\d{2})\s*년?'
  # 연도 헤더 (xlsx) — 영문 'FY' 'fy' 'F/Y' 포함
  year_header: '(?:FY|fy|F/Y\s*)?(\d{4})\s*(?:년|FY|fy)?$'
# 2자리 연도 → 4자리 변환 시 prefix (한국 RFP 관행: 2000년대 기본).
# 다른 시대 데이터면 yaml 수정만으로 변경.
year_2digit_prefix: '20'

# === xlsx 스캔 범위 ===
# 큰 시트에서 헤더·메타 찾을 때 스캔할 최대 행/열. 표준 양식은 작은 영역.
# 변경 가이드: 더 큰 양식이면 늘림. 너무 크면 매칭 모호성 증가.
scan_limits:
  max_header_row: 30   # 헤더 행 (FY20XX) 검색 범위 — find_year_columns
  max_meta_row: 15     # 메타 (회사명·단위) 검색 범위 — extract_meta
  max_meta_col: 8

# === 매칭 점수 가중치 ===
# extract_finance.py · fill_finance_cells.py 가 keyword 매칭 시 사용.
# 같은 *필드*에 *여러 후보 행*이 매칭될 때 점수 비교로 best 선택 (합계 행 > 항목 행).
# 변경 가이드: 합계 우선 강화하려면 total_bonus 늘림.
scoring:
  base: 100              # 매칭 기본 점수
  total_bonus: 50        # 합계/총계 행 보너스
  indent_penalty_per_char: 2  # 들여쓰기 1글자 당 페널티 (세부 항목 < 대분류)
  exact_label_bonus: 30  # 정규화 후 정확 일치 보너스
  # match_field (fill_finance_cells) 용
  field_base: 10         # 부분 일치 기본 점수
  field_exact_bonus: 50  # 전체 일치 보너스

# === 필드별 라벨 사전 ===
fields:
  capital:
    exact_labels:
      - 자본금
      - 납입자본금
      - 주식자본금
    keywords:
      - 자본금
      - 납입자본
      - 보통주자본

  total_assets:
    exact_labels:
      - 자산총계
      - 총자산
    keywords:
      - 자산총계
      - 총자산
      - 자산 합계
      - Total Assets

  total_liabilities:
    exact_labels:
      - 부채총계
      - 총부채
    keywords:
      - 부채총계
      - 총부채
      - 부채 합계
      - Total Liabilities

  total_equity:
    exact_labels:
      - 자본총계
      - 총자본
      - 자기자본
    keywords:
      - 자본총계
      - 총자본
      - 자기자본
      - Total Equity

  revenue:
    exact_labels:
      - 매출액
      - 영업수익
      - 총매출
      - 총매출액
    keywords:
      - 매출액
      - 매출
      - 영업수익
      - Revenue
      - Sales

  operating_income:
    exact_labels:
      - 영업이익
    keywords:
      - 영업이익
      - 영업손익
      - Operating Income
      - Operating Profit

  net_income:
    exact_labels:
      - 당기순이익
      - 순이익
    keywords:
      - 당기순이익
      - 순이익
      - 순손익
      - Net Income
      - Net Profit

  capital_raised:
    exact_labels:
      - 유상증자
      - 투자유치
      - 투자유치실적
      - 투자금
      - 외부투자
    keywords:
      - 유상증자
      - 투자유치
      - 투자금
      - 외부투자
      - Capital Raised
      - Equity Issuance
      - Paid-in Capital Increase

# === 단위 인식 (양식 셀의 단위 표기 → 원 단위 변환 계수) ===
# 빌더가 finance.yaml의 *원 단위* 값을 *셀이 요구하는 단위*로 나누어 표시.
unit_patterns:
  - pattern: 백만원
    divisor: 1000000        # finance value ÷ 1,000,000 = 백만원
  - pattern: 억원
    divisor: 100000000
  - pattern: 천원
    divisor: 1000
  - pattern: 원
    divisor: 1

# default: 단위 없으면 백만원 (한국 RFP 관행)
unit_default:
  pattern: 백만원
  divisor: 1000000

# === 제안서 출력 단위 정책 (사용자 정책) ===
# 재무제표 (엑셀) 의 값은 *원본 단위* 그대로 읽음 (finance.yaml meta.currency_unit).
# 제안서 채움 시 *양식이 옆 단위 셀로 명시* 한 셀은 그 단위 변환 (양식 우선).
# 양식이 단위 명시 *안 한* 셀은 *이 정책 단위 통일* — 표기 일관성 보장.
# 다른 단위(천원·억원) 원하면 yaml 만 수정. 코드 변경 0.
proposal_output_unit:
  pattern: 백만원
  divisor: 1000000

# === 빌더 결정 규칙 ===
# - 셀 라벨 normalize → fields 의 exact_labels 먼저 매칭
# - 없으면 keywords substring 매칭
# - 매칭된 필드 + 라벨에서 추출된 연도 → finance.yaml records[year][field]
# - 단위 변환 + 천단위 콤마 포맷
# - 데이터 없으면 '(확인 필요)' 표기
