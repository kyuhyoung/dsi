- id: P55
  text: ❍ 당사 상용화 대상 「Eartheye Plantation」은 위성(광역)·드론(정밀)·모바일 다출처 영상 데이터를 통합 분석하여 팜(오일)
    농장의 생육 환경, 건강도 변화 추이, 열매 숙성도를 자동 분석하고 농장 운영 의사결정을 지원하는 GeoAI 기반 통합 플랫폼입니다. 데이터
    수집부터 분석·의사결정·현장 실행까지 통합한 End-to-End 서비스 구조로, 글로벌 임·농업 및 플랜테이션 시장의 생산성 향상과 대규모
    농장 운영 효율화를 목표로 합니다.
  source: kb/company/dabeeo/tech-core.md (EARTHEYE PLANTATION)
- id: P56
  text: '- 다비오 자체 개발 GeoAI 6대 백본 기술 (객체 탐지·의미론적 분할·변화 탐지·초해상화·이미지 정합·3차원 재건)을 통합 적용하여,
    팜나무·작물 객체 탐지 정확도 F1-Score 0.98 수준, EVI 기반 식생 건강도 4단계 자동 분류, 시계열 변화 탐지 precision
    100%·recall 97.5%, 30cm급 위성영상 → 7.5cm급 초해상화 처리를 단일 플랫폼에서 제공합니다.'
  source: kb/company/dabeeo/tech-core.md (6대 백본), quantitative.md §1, §13
- id: P57
  text: '* 세계 최초 30cm 초고해상도 위성영상 기반 팜(오일) 농장 관리 솔루션으로, 3,000㎢ 이상 면적의 상용 분석 서비스를 통해
    고객 검증을 완료하였습니다. 기존 1,000㎢ 드론·수작업 분석 약 345일이 소요되던 워크플로우를 위성·AI 자동화로 약 29일 수준으로
    약 12배 단축하여, 본 사업의 1년 내 상용화(타입1) 목표 달성이 가능한 기술 성숙도를 보유합니다.'
  source: kb/company/dabeeo/quantitative.md §1-1, §2-1, §3-2
- id: P61
  text: '❍ 핵심 차별성 — 세계 최초 30cm 위성 기반 임·농업 상용화: 당사 Eartheye Plantation은 세계 최초 30cm
    초고해상도 위성영상 기반 임·농업 분야 상용화 경험을 확보한 유일한 솔루션으로, 글로벌 임·농업 시장에서 직접 비교 가능한 경쟁제품이 부재합니다.
    자체 개발 초해상화 AI 모델을 통해 30cm급 위성영상을 7.5cm급 수준으로 향상시켜, 위성의 광역성과 드론 수준의 정밀도를 동시에 확보합니다.'
  source: kb/company/dabeeo/quantitative.md §13, §1-1, tech-core.md
- id: P62
  text: '- 기술 깊이: 초해상화·이미지정합·의미론적분할·객체탐지·변화탐지·3차원재건의 6대 백본 기술을 통합한 학습 파이프라인은 약 27개
    세부 기술의 누적 R&D 결과로, 단일 기술의 부분 복제만으로는 동등한 분석 성능·정확도·신뢰성을 재현할 수 없습니다. 데이터 수집·전처리·AI
    분석·플랫폼·현장 실행까지 전주기 통합 프로세스가 후발 진입자에 대한 구조적 진입 장벽으로 작용합니다.'
  source: kb/company/dabeeo/tech-core.md (6대 백본), quantitative.md §3-1
- id: P63
  text: '* 외부 검증: 2024년 과학기술정보통신부 주최·TTA 주관 「인공지능 신뢰성·품질 대상」 최고상(장관상)을 수상하여 핵심 기술의
    신뢰성·품질을 공인 외부 평가로 검증받았습니다. 국내 특허 25건·해외 특허 7건 등록 + 약 27개 세부 기술 중 85%가 TRL 7 이상,
    59%가 TRL 9 단계 (양산 13개 기술) 도달.'
  source: kb/company/dabeeo/quantitative.md §10-1, §9-3, §4-1, §3-1
- id: P67
  text: ❍ 본 상용화 대상의 기술성숙도는 TRL 7~8 수준으로, 인도네시아 SALIM 그룹·KORINDO 대상 파일럿 검증을 통해 99%
    이상 탐지 정확도·100% 건강도 분류 성능을 입증하였으며, 협약 기간 내 TRL 9 수준 (실사용 및 성과 검증 완료)으로 고도화할 계획입니다.
  source: kb/company/dabeeo/quantitative.md §3-2, RFP 자격요건 TRL_단계별_증빙
- id: P68
  text: '- 협약 기간 내 TRL 달성 단계 — 1단계(1~3개월): 시설·장비 구축 + TRL 7 환경 시험 결과서 확보, 2단계(4~9개월):
    시제품 실증·양산형 완성 + TRL 8 신뢰성 시험 결과 + ISO 인증 갱신, 3단계(10~12개월): 실사용 성과 보고 + 납품 실적·사용자
    만족도 평가 (TRL 9 도달).'
  source: RFP 자격요건 TRL_단계별_증빙 + 비즈니스결정 일정
- id: P69
  text: '* 지식재산권 현황: 등록 25건·출원 26건 등 총 51건 특허 자산 확보 (해외특허 7건·ISO 국제인증 1건 포함). 핵심 알고리즘·데이터
    처리 파이프라인·플랫폼 구조 등 제품화 기술 전반에 대한 권리 체계 구축. 협약 기간 내 농식품 응용 특화 신규 특허 5건 출원 계획.'
  source: kb/company/dabeeo/quantitative.md §4-1, §9-3
- id: P73
  text: ❍ 본 상용화 대상의 목표시장은 「국내 농식품 정밀농업(GeoAI) 시장」과 「해외 임·농업 분석 시장」을 분리하여 접근합니다. 글로벌
    정밀농업(GeoAI) 시장은 연평균 11.6%, 아시아·태평양 지역은 약 14.9% 성장률로 성장 중이며, 2030년까지 약 2조원 규모로
    성장할 것으로 전망됩니다.
  source: kb/company/dabeeo/quantitative.md §5-2
- id: P74
  text: '- 국내 시장: 농림축산식품부 디지털농업 정책 가속화 + 농협중앙회·aT·지자체 농업기술센터 등 공공 수요처 확장 + 스마트팜 보급
    본격화로, 연간 약 1,200억원 수준 GeoAI 농업 수요 추정 (당사 자체 시장 분석). 주요 고객 특성: 공공 농업 R&D 기관·대규모
    농업법인·식품 가공기업.'
  source: kb 추정 + RFP 지원분야 (스마트농업·그린바이오)
- id: P75
  text: '* 해외 시장: 글로벌 팜오일 시장 약 110조원 규모, 인도네시아 4,670만 톤(58%)·말레이시아 약 2,020만 톤(25%)
    등 상위 2개국이 전 세계 생산량 80% 이상 차지. 팜유는 전 세계 식용유 시장 약 35%·타 작물 대비 5~10배 높은 생산 효율. 당사는
    4개국(인도네시아·말레이시아·베트남·핀란드) 수출 실적 보유.'
  source: kb/company/dabeeo/quantitative.md §5-1, §9-1
- id: P79
  text: ❍ 당사는 국내 위성영상 분석 서비스 기업 중 최초로 해외 상용 계약(TSE 그룹 팜농장 모니터링)을 체결한 사업자로, 글로벌 정밀농업
    시장에서 「한국 발 임·농업 GeoAI 표준」을 선도할 수 있는 유일한 사업자입니다. 국내·해외 시장 모두 기존 경쟁제품 대비 정량 성능 우위
    (탐지 F1 0.98·변화탐지 precision 100%) 확보.
  source: kb/company/dabeeo/quantitative.md §9-1, §1
- id: P80
  text: '- 시장 점유 가능성: 인도네시아 SALIM 그룹·KORINDO·Triputra Agron 3대 메이저 팜농장 고객 확보 + 4년
    장기 계약(KORINDO) + Airbus·Vantor 등 다중 위성 데이터 공급사 파트너십으로 특정 공급사 의존도를 최소화하여 안정적 매출
    기반을 확보합니다.'
  source: kb/company/dabeeo/quantitative.md §3-2, §9-4, projects.md
- id: P81
  text: '* 해외 시장 진출 가능성: 인도네시아·미국·베트남 3개 해외 법인 운영 (현지 Sales Forces) + 해외 기업 총 74건
    국제 협약(MOU 14건·NDA 60건) + 농식품 모태펀드 투자 포트폴리오 선정으로 농식품 산업 정책 적합성을 확보합니다. 본 사업을 통해
    국내 PoC 후속 해외 확장을 가속화합니다.'
