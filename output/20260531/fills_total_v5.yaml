- id: T53_R0_C0
  text: "❍ 정량 (필수·기업지표) 달성 상세:\n   ① 상용화 건수 5건 = 국내 농협중앙회 1건 + aT 1건 + 지자체 농업기술센터\
    \ 2건 + 식품 가공기업 1건. 기존 공공·민간 공급 채널 (카카오·네이버·한국자산관리공사·대전시 등) 농식품 영역 확장으로 달성.\n \
    \  ② 수출 매출 10억원 = KORINDO 4년 장기 계약 후속 + Triputra Agron 스마트 플랜테이션 수주 + 베트남·말레이시아\
    \ 신규 발굴. 인도네시아 법인 현지 Sales Forces 활용.\n   ③ 국민체감활동 3건 = 박람회 4건 이상 (KOFRUM·코엑스\
    \ 농식품 박람회) + 제품설명회 3건 + 농민 현장 시연 부스 운영.\n❍ 정성 달성 상세: 1,000㎢ 면적 12배 시간 단축 + 농민\
    \ 생산성 약 12% 개선 + 연간 약 4,175만 달러 매출 증대 효과 (KORINDO 실측 사례) 직접 시연. 농민·공공기관·식품 가공기업이\
    \ GeoAI 정밀농업 효용성을 체감할 수 있도록 부스·시연·체험형 콘텐츠 운영.\n❍ 달성 근거: KORINDO 99% 이상 탐지 정확도\
    \ + SALIM 100% 건강도 분류 + Triputra 스마트 플랜테이션 수주 실적 — 동일 모델 국내 농식품 영역 확장 + 기존 4개국\
    \ 수출 채널 활용으로 1년 내 달성 가능.\n"
  intent: instruction_placeholder
  source: kb/company/dabeeo/quantitative.md §3-2, §9-1, §12, §2-1, §2-2
