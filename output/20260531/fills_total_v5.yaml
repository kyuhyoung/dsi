- id: T18_R5_C2
  text: '❍ 선정 이유: 농림축산식품부 디지털농업 정책 가속화와 농협중앙회·aT·지자체 등 국내 공공·민간의 GeoAI 농업 수요 본격 확장
    추세에 부합하는, 1년 내 상용화 가능 검증 솔루션.

    ❍ 시장 필요성: 글로벌 정밀농업 시장 연평균 11.6% 성장 + 아시아·태평양 약 14.9% 성장, 2030년 약 2조원 규모 전망. 농민
    1인당 면적 평균 1.27헥타르의 한국 현실에서 위성+AI 자동 분석을 통한 노동력 절감·생산성 향상이 시급함 (당사 사례 약 12% 개선).

    ❍ 정책 적합성: 농식품 모태펀드 투자 포트폴리오 선정 기업으로 기술성·사업성 검증 완료. 농식품 산업 혁신·신성장 트랙 정책 목적과 부합하며,
    본 사업이 정책 실증 데이터 제공 역할을 수행합니다.

    '
  intent: instruction_placeholder
  source: kb/company/dabeeo/quantitative.md §5-2, §6-3, §2-1 + RFP 사업목적
- id: T18_R10_C2
  text: '❍ 상용화 방안: ① 국내 5건 상용화 (농협 1건 + aT 1건 + 지자체 2건 + 식품 가공기업 1건), ② 해외 수출 매출 10억원
    (KORINDO 4년 장기 계약 후속 + Triputra Agron 확장 + 베트남·말레이시아 신규), ③ 국민체감활동 3건 (박람회 4건
    이상 + 농민 현장 시연 부스).

    ❍ 기대효과: 농민 생산성 약 12% 향상 + 연간 약 4,175만 달러 매출 증대 효과 사례 (당사 KORINDO 솔루션 실측) 국내 적용,
    농식품 분야 일자리 4명 추가 고용, 한국 발 임·농업 AI 표준의 글로벌 수출 가속화.

    ❍ 5년 누적 효과: 국내 누적 50개 고객 + 연간 매출 100억원 + 누적 매출 1,000억원 도달, 농식품 모태펀드 추가 라운드 및 기술특례상장(IPO)
    추진.

    '
  intent: instruction_placeholder
  source: kb/company/dabeeo/quantitative.md §12, §2-2, §6-5 + RFP 정량지표
- id: T19_R2_C0_P0
  text: ○ 기존 임·농업 모니터링은 드론 촬영 + 수작업 영상 판독에 의존하여, 1,000㎢ 분석에 약 345일이 소요되며, 분석 인력·시간
    의존도가 높아 의사결정이 지연되는 구조적 한계가 존재합니다.
  intent: placeholder
  source: kb/company/dabeeo/quantitative.md §2-1
- id: T19_R2_C0_P1
  text: '- 데이터가 비정형화되어 분석 결과가 의사결정·현장 작업으로 연계되지 않는 단절된 운영 체계입니다.'
  intent: placeholder
  source: kb/company/dabeeo/tech-core.md (As-Is 한계)
- id: T19_R2_C0_P2
  text: '* 광범위 촬영 운용 비용과 영상 정합 전처리에서 비용·운영 부담이 발생하여 대규모 농장 환경에서 생산성·운영 효율 저하의 구조적
    한계가 있습니다.'
  intent: placeholder
  source: kb/company/dabeeo/tech-core.md (As-Is 한계 상세)
- id: T19_R2_C1
  text: '○ 당사 Eartheye Plantation은 위성·드론·모바일 통합 GeoAI 분석으로 동일 면적을 약 29일에 처리(약 12배
    단축)하여, 자동화·고정밀·시계열 처리 결과를 제공합니다.

    - 6대 GeoAI 백본 기반 4대 핵심 기능: ① 팜나무·열매 객체 탐지(F1-Score 0.98), ② EVI 기반 식생 건강도 4단계
    자동 분류, ③ 시계열 변화 탐지(precision 100%·recall 97.5%), ④ 위성영상 초해상화(30cm→7.5cm).

    * 분석-의사결정-현장 적용이 통합된 End-to-End 체계로, 기존 룰 기반·수작업 판독 방식 대비 AI 응용제품의 본질 요건을 충족합니다.

    '
