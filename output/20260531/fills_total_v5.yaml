- id: T25_R0_C0
  text: '❍ 글로벌 정밀농업(GeoAI) 시장: 연평균 11.6% 성장, 아시아·태평양 약 14.9% 성장, 2030년 약 2조원 규모 전망.

    ❍ 국내 시장: 농림축산식품부 디지털농업 정책 가속화 + 농협중앙회·aT·지자체 농업기술센터 등 공공 수요처 확장 + 스마트팜 보급 본격화로,
    연간 약 1,200억원 수준 GeoAI 농업 수요 추정 (당사 자체 시장 분석). 주요 고객: 공공 농업 R&D 기관·대규모 농업법인·식품
    가공기업. 기술 수준: AI 자동 탐지·시계열 변화 처리 솔루션 부재.

    ❍ 해외 시장: 글로벌 팜오일 시장 약 110조원 규모, 인도네시아 4,670만 톤(58%)·말레이시아 약 2,020만 톤(25%)이 전 세계
    생산량 80% 이상 차지. 팜유는 전 세계 식용유 시장 약 35%, 타 작물 대비 5~10배 높은 생산 효율. 당사 4개국 (인도네시아·말레이시아·베트남·핀란드)
    수출 실적 + 인도네시아·미국·베트남 3개 해외 법인 현지 Sales Forces 운영.

