- id: P188
  text: ❍ 5-1 성과지표의 정량 (필수·기업지표) 및 정성 내용 달성을 위한 실현 가능성은 「기 검증된 글로벌 사례 + 본 사업 기간 동안
    달성 가능한 단계별 KPI」를 통해 입증됩니다. ① 상용화 건수 5건 = 국내 농협 1건 + aT 1건 + 지자체 2건 + 식품 가공기업 1건,
    ② 수출 매출 10억원 = KORINDO 후속 + Triputra Agron, ③ 국민체감활동 3건 = 박람회 4건 이상.
  source: kb/company/dabeeo/quantitative.md §12
- id: P189
  text: '- 달성 근거: KORINDO 4년 장기 계약(99% 이상 탐지 정확도) + SALIM 그룹 파일럿(100% 건강도 분류) + Triputra
    Agron 스마트 플랜테이션 수주 — 동일 모델을 국내 농식품 영역으로 확장 + 기존 4개국 수출 채널 활용.'
  source: kb/company/dabeeo/quantitative.md §3-2, §9-1
- id: P190
  text: '* 정성 달성: 상용화 AI 기술의 효용성을 국민이 체감할 수 있도록 박람회·제품설명회·농민 현장 시연 부스 운영 (1,000㎢ 면적
    12배 시간 단축 + 연간 약 4,175만 달러 매출 증대 효과 실측 사례 직접 시연).'
  source: kb/company/dabeeo/quantitative.md §2-1, §2-2
- id: P196
  text: ❍ 본 사업 추진 일정은 협약일 기준 1년 (타입1) 기간 동안 「계획수립(1~2월) → 시설·장비 구축(1~3월) → 시제품 실증(2~5월)
    → 외주가공·디자인(3~6월) → 양산형 완성(6~9월) → 중간보고(6월) → 판로 확보(全 기간) → 홍보·성과 창출(4~12월) → 최종보고(12월)」
    9개 단계로 구성됩니다 (T57 간트표 참조).
  source: 비즈니스결정 + T57 간트표
- id: P197
  text: '- 상용화 완료 시점: 협약 후 9개월 (양산형 제품 완성) + 10개월차부터 국내 PoC 1차 계약 체결 시작 + 12월 최종보고
    시점 누적 5건 상용화 달성 (RFP 필수 정량지표 — 상용화 건수).'
  source: 비즈니스결정 + RFP 정량지표
- id: P198
  text: '* 월 단위 핵심 마일스톤: 1월 계획수립·시설구축 시작, 3월 시제품 실증 본격화, 6월 중간보고서 제출 + 외주가공 완료, 9월
    양산형 제품 완성, 10월 국내 PoC 1호 계약, 12월 누적 5건 상용화 + 최종보고서 제출.'
  source: 비즈니스결정 + T57 간트
- id: P222
  text: '❍ 본 사업 종료 후 향후 5년간 안정화·확장 계획: ① 1년차(본 사업 종료): 국내 5건 상용화 + 수출 10억원 + 기술특례상장(IPO)
    준비 본격화, ② 2년차: 동남아 확장 (KORINDO·SALIM·Triputra 후속 + 베트남·말레이시아 신규), ③ 3년차: 북미·유럽
    진출 (미국 법인 활용), ④ 4~5년차: 누적 매출 1,000억원 도달 + AI 허브 데이터 개방 확대.'
  source: kb/company/dabeeo/quantitative.md §6-5
- id: P223
  text: '- 자금조달 및 투자유치 계획: 본 사업 종료 시점 시리즈 9 투자 클로징 + IPO 추진. 농식품 모태펀드 출자 펀드 추가 라운드
    + 정부지원 과제 추가 수주 (현재 누적 29건·112.4억원 → 5년 후 50건·200억원 목표).'
  source: kb/company/dabeeo/quantitative.md §6-3, §6-4, §6-5
- id: P224
  text: '* 추가 기술·제품 개발 및 고도화 계획: ① 열매 숙성도 + 병해충 진단 + 수확량 예측 모델 추가 (1~2년차), ② Eartheye
    Plantation Pro/Enterprise 등급 출시 (2~3년차), ③ AI 허브 농식품 데이터 개방 (3~5년차), ④ 글로벌 표준
    GeoAI 농업 플랫폼 등극 (5년차).'
  source: kb/company/dabeeo/tech-core.md, RFP 비기능 (AI 허브 개방)
