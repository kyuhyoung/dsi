- id: T45_R0_C0
  text: '❍ 단독신청으로 본 사업과 관련한 지재권·제품/서비스 소유권·계약체결·이익 분배는 모두 주관기업 (주식회사 다비오) 단독 귀속합니다
    — 컨소시엄 구성 시 발생 가능한 의사결정 지연·이익 분배 분쟁 리스크 사전 제거.

    ❍ 외부 협력 (산학·위성 데이터 공급) 관계는 별도 NDA·연구 협약을 통해 사전 합의가 완료되어 있습니다. 본 사업과 관련된 신규 IP
    (예: 협약 기간 내 농식품 응용 특화 신규 특허 5건 출원 계획)는 모두 다비오 단독 소유로 처리합니다.

    ❍ 산학협력 대학 공동연구의 경우 별도 산학협력단 표준 협약에 따라 IP 공유(다비오 60%·대학 40% 표준)되나, 본 사업 IP는 별도
    트랙으로 관리하여 다비오 단독 귀속을 보장합니다. 위성 데이터 공급사 (Airbus·Vantor)와는 데이터 사용권 라이선스 계약만 체결하며,
    분석 결과물·알고리즘 IP는 다비오 단독입니다.

    '
  intent: instruction_placeholder
  source: '비즈니스결정: 단독 + kb/company/dabeeo/quantitative.md §4-1, §9-4'
