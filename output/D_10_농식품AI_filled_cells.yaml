  # ═══════════════════════════════════════════════════════════
  # table 18 사업계획서 요약 (2페이지 내외)
  # ═══════════════════════════════════════════════════════════
  - table_idx: 18
    row: 1
    col: 1
    text: 'Eartheye Plantation — 위성·드론·모바일 다중센서 AI 분석 기반 팜농장 모니터링·의사결정 지원 SaaS'
    source: 'kb/company/dabeeo/projects.md'
  - table_idx: 18
    row: 2
    col: 1
    text: '다비오의 6대 AI 백본 기술(초해상화·이미지 정합·의미론적 분할·객체 탐지·변화 탐지·3차원 재건)을 결합하여 30cm급 위성영상(자체 초해상화로 7.5cm급 수준 향상)에서 팜나무를 F1 0.98 수준으로 객체 탐지하고, EVI 기반 4단계 건강도 분류와 시계열 변화 탐지(precision 100%, recall 97.5%), 모바일 기반 열매 숙성도 4단계 분류(96% 정확도)를 End-to-End로 제공한다. 1,000㎢ 기준 분석 기간을 기존 드론·수작업의 345일에서 29일로 단축하고 농장 생산성을 약 12% 개선한다.'
    source: 'kb/company/dabeeo/quantitative.md §1, §2, §13'
  - table_idx: 18
    row: 5
    col: 1
    text: '글로벌 팜오일 시장은 약 110조원 규모이며 인도네시아(58%)·말레이시아(25%) 두 국가가 전 세계 생산량의 80% 이상을 차지한다. 그러나 기존 드론·수작업 기반 모니터링은 비용·시간 비효율이 극심하여, 위성·AI 결합 정밀농업(GeoAI) 시장(연평균 11.6% 성장, 2030년 2조원 규모)으로의 빠른 전환 수요가 존재한다. 다비오는 2023년 세계 최초로 30cm 초고해상도 위성영상을 AI로 분석하여 임·농업 분야에 상용화한 경험을 보유하며, 본 사업으로 국내 농식품 수요처(스마트팜·식품·축산)까지 확장한다.'
    source: 'kb/company/dabeeo/quantitative.md §5, §13-2, business.md 임·농업'
  - table_idx: 18
    row: 6
    col: 1
    text: '다비오 단독 신청 (컨소시엄 부). 본사 AI Center & Data Management(R&D 64명: 개발 49명·딥러닝 15명)와 베트남 데이터랩(Dabeeo Vina, 데이터 35명, 최대 100명 확장)이 End-to-End 학습데이터 운영을 담당하며, 인도네시아 법인이 해외 영업·현장 검증을, 미국 법인이 글로벌 사업화를 분담한다.'
    source: 'kb/company/dabeeo/organization.md, quantitative.md §8-2'
  - table_idx: 18
    row: 7
    col: 1
    text: '1년차(2026): 국내 농식품 도메인 데이터 수집·국내 파일럿 PoC(스마트팜 1~2건) 및 SaaS 가격 정책 현지화. 2년차(2027): 농식품 수요처 정식 계약 5건 확보·해외 전시회 4건 이상 참가·수출 매출 10억원·기술인력 5명 신규 채용. 핵심 추진 전략은 ① 기존 임·농업 검증 자산(KORINDO·Salim 사례) 활용 ② 농식품 모태펀드 투자 기업으로서 농림축산식품부 정책 적합성 입증 ③ 1㎢당 USD 500 표준 단가 SaaS 모델로 매출 확장.'
    source: 'kb/company/dabeeo/quantitative.md §6-3, §7, §12, projects.md'
  - table_idx: 18
    row: 8
    col: 1
    text: '목표시장: 국내 스마트농업·그린바이오·푸드테크·스마트축산 기업 + 동남아 팜농장(인도네시아·말레이시아·베트남·필리핀). 주요 고객층: ① 농협·지자체 스마트팜 사업 ② 대형 식품·식자재 기업(수요처 농작지 모니터링) ③ 동남아 팜오일 그룹(KORINDO·Salim 후속 확장).'
    source: 'kb/company/dabeeo/business.md 임·농업, projects.md KORINDO·Salim'
  - table_idx: 18
    row: 9
    col: 1
    text: 'TRL 8 수준 검증 완료 — Salim 그룹 대상 99% 이상 탐지 정확도·100% 건강도 분류, KORINDO 대상 4년 장기 계약 수주. 기 보유 27개 세부 기술 중 85%가 TRL 7 이상, 59%가 TRL 9 도달. 기존 4개국(인도네시아·말레이시아·베트남·핀란드) 수출 실적·국내 최초 해외 상용 계약(TSE 그룹) 보유. 정부지원 과제 29건(112.4억원)·과기부 인공지능 신뢰성·품질 대상 장관상 등 종합 검증 완료.'
    source: 'kb/company/dabeeo/quantitative.md §3-2, §9-1, §6-4, §10'
  - table_idx: 18
    row: 10
    col: 1
    text: '국민체감 확산: ① 농식품부 산하 농진원·지자체 스마트팜 사업 연계 시연 3건 ② 해외 박람회(SIAL·Indo Livestock 등) 4건 이상 참가 ③ 농식품 모태펀드 투자 기업·과기부 신뢰성 대상 수상기업으로서 정책 홍보 효과. 경제적 효과: 농장 생산성 12% 개선 시 연 4,175만 달러(약 610억원) 매출 증대 모델을 국내 농식품 수요처에 이식.'
    source: 'kb/company/dabeeo/quantitative.md §2-2, §10, §12'

