narrative_paragraphs:
  - after_table: 23  # 1장 끝, 2장 헤더(24) 앞
    section: '1. 상용화 대상 개요'
    body: |
      1-1. 상용화 대상 소개
      당사는 6대 AI 백본 기술(초해상화·이미지 정합·의미론적 분할·객체 탐지·변화 탐지·3차원 재건)을 결합한 Eartheye Plantation을 본 사업의 상용화 대상으로 한다. 위성·드론·모바일 다중센서 영상을 End-to-End로 분석하여 팜나무·과수·논밭 등 농업 객체를 탐지하고, 건강도·생육·열매 숙성도를 분류하며, 시계열 변화를 자동 추적하는 GeoAI SaaS이다.

      1-2. 기술적 차별성
      ① 위성 광역성과 드론 정밀도의 결합 — 30cm 위성영상을 자체 초해상화 AI로 7.5cm급 수준까지 향상하여 드론 없이도 정밀 분석. ② F1 0.98 수준 객체 탐지 — SALIM·KORINDO 현장 검증으로 99% 이상 탐지 정확도 입증. ③ EVI 기반 4단계 건강도 분류 + 시계열 변화 탐지 precision 100%·평균 recall 97.5%. ④ 1,000㎢ 분석 기간을 345일 → 29일로 약 12배 단축, 농장 생산성 약 12% 개선(연 4,175만 달러 매출 증대 효과 검증). 출처: 당사 quantitative §1, §2, §13.

      1-3. 기술성숙도(TRL) 및 지식재산권
      당사 27개 세부 기술 중 85%가 TRL 7 이상, 59%가 TRL 9 도달. 본 상용화 대상은 TRL 8 단계 (SALIM·KORINDO 양산 전 검증 완료). 지식재산권은 등록·출원 합계 51~59건(시점 기준 차이) 보유 — 팜나무 지오레퍼런싱 알고리즘·초해상화 AI 모델·열매 숙성도 분석 등 임·농업 특화 특허 다수.

  - after_table: 26  # 2장 끝
    section: '2. 상용화 대상 시장'
    body: |
      2-1. 목표시장 현황
      글로벌 팜오일 시장은 약 110조원 규모이며 인도네시아(58%)·말레이시아(25%) 두 국가가 전 세계 생산량의 80% 이상을 차지. 팜유는 전 세계 식용유 시장의 약 35%, 타 작물 대비 5~10배 높은 생산 효율을 가진다. 위성·AI 결합 정밀농업(GeoAI) 시장은 연평균 11.6% 성장, 아시아·태평양 14.9%, 2030년 2조원 규모 전망.

      2-2. 국내·외 시장 점유 및 성장 가능성
      국내 시장은 농식품부·지자체 스마트팜 사업·식품·축산 대기업 수요처가 형성 중. 당사는 2023년 세계 최초 30cm 위성영상 임·농업 상용화 경험을 보유하여 진입 장벽이 낮으며, 본 사업으로 국내 수요처(농협·지자체·식품 대기업) 5건 이상 확보 목표. 해외는 4개국(인도네시아·말레이시아·베트남·핀란드) 수출 실적과 KORINDO 4년 장기 계약·Salim 전면 계약·Triputra Agron 스마트 플랜테이션 계약으로 동남아 시장 입지 확보.

  - after_table: 33  # 3장 끝
    section: '3. 상용화 계획 및 전략'
    body: |
      3-1. 상용화 준비 수준
      TRL 8 단계 완료. SALIM 99% 탐지·100% 건강도 분류, KORINDO 4년 장기 계약 운영 중. 1㎢당 USD 500 표준 단가, Essential 패키지 + 부가 서비스 구조의 SaaS 가격 정책 확립. 농식품 모태펀드 투자 포트폴리오 선정으로 정책 적합성·기술성·사업성 검증 완료.

      3-2. 시장진입 및 확산
      1년차(2026): 국내 농식품 도메인 데이터 수집·전처리, 국내 PoC 2건(스마트팜·축산), 한국어 UI·도메인 모델 fine-tuning. 2년차(2027): 정식 상용화 5건·해외 박람회 4건 이상·수출 10억원·딥러닝 인력 5명 채용. 채널: 농진원·지자체 농업기술센터 협력 + 식품·축산 대기업 직접 영업 + 농협 전국망 활용.

      3-3. 차별화
      ① 위성·드론·모바일 통합 GeoAI (분석·추적·의사결정·현장 실행 End-to-End). ② 한국어 UI + 국내 농식품 도메인 특화. ③ 1㎢당 USD 500 면적 기반 recurring revenue SaaS — 농장 규모에 비례한 확장성. ④ 인공지능 신뢰성·품질 대상(과기부 장관상) 수상기업 신뢰성.

      3-4. 확장
      국내 검증 후 동남아 → 글로벌 식품·축산·임업 시장 확대. K-LEO 산업협력 TF 참여로 국내 위성 데이터 공급망 확보, Airbus·Vantor 다중 위성 파트너십으로 공급사 의존도 최소화.

      3-5. 위기 대응
      ① 위성 데이터 공급 리스크 — Airbus·Vantor 등 다중 파트너 구조. ② 영업비밀·AI 허브 데이터 개방 리스크 — 핵심 학습데이터 분리·메타데이터만 개방 검토. ③ 사업비 교부 조정 가능성(RFP 위험 신호) — 핵심 인건비 우선 집행·외주 비목 후순위.

      3-6. 기대효과
      국내 농식품 생산성 12% 개선 시 산업 차원 매출 증대 효과 발생 (글로벌 사례 연 4,175만 달러 = 약 610억원/기업). 국가 식량 안보·농촌 디지털 전환 기여. AI 허브 데이터 일부 개방으로 국내 농업 AI 생태계 활성화.

