  - row: 1
    col: 1
    text: · 협약 기간 중 신규 채용한 인력 및 기존 고용인력에 대해 집행 가능하며, 신규 채용 인력은 협약 종료일 2개월 이전 채용 인력에
      한하여 집행 가능 · 인건비는 ‘고용보험’ 가입 직원에 한하여 집행 가능하며, 지원기업 부담 4대 보험료를 포함하여 집행 가능 · 인건비
      지급 대상인 대표, 사업 총책임자 및 직원은 참여율 100% 한도로 사업 참여율에 따라 지급 가능 · 협약 기간 내 직원별 급여는 ①월급여×②참여기간×③참여율로
      한다.  ① 지원기업의 급여기준에 따른 연봉계약서 총액을 12로 나눈 것단, 연봉 계약체결을 하지 않는(단기 인력 등) 인력의 경우 근로계약서로
      대체할 수 있다.  ② 월 단위만 인정  ③ 정수만 인정(소수점 이하 불인정) · 현물 인정 범위는 사업공고일 전, 상용화 대상과 직접적인
      관련이 있는 업무를 수행하는 기 채용된 인력으로 한하여 인정한다. · 인건비는 총사업비의 50% 이하로 편성해야 함(주관·참여기업 총합)
    colspan: 1
    rowspan: 1
    inner_ps:
    - sub_idx: 0
      text: · 협약 기간 중 신규 채용한 인력 및 기존 고용인력에 대해 집행 가능하며, 신규 채용 인력은 협약 종료일 2개월 이전 채용
