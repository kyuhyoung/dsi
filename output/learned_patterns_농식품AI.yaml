# =================================================================
# 2. C 양식 → D 실작성 변환 규칙 (농식품AI 전용)
# =================================================================
form_fill_rules:
  - 양식_필드: 'C의 자가진단서 (지원자격·중복수혜·기술성숙도 표)'
    채움_데이터: '중소기업·기술/상용화 성숙도 ○ 표기, 중복수혜 해당 없음'
    예: 'D 1~14행 표 (내용은 마스킹되어 직접 확인 불가하나 D 구조상 동일 위치)'
    규칙: 'B의 자가진단서 항목 그대로 ○ 마킹'

  - 양식_필드: 'C 1-1 ~ 1-3 도입부의 "<표>" 자리'
    채움_데이터: 'D에서 <표> 자리는 그대로 유지 (요약표·실적표 등 시각화 자산)'
    예: 'D 32행, 102행, 124행 등 <표>·<그림> 다수'
    규칙: '본문 작성 시 양식의 <표>·<그림> 위치를 그대로 보존, 본문은 ❍ 구조로 추가'

  - 양식_필드: 'C 5-1 성과지표 표 (상용화 건수·국민체감활동·매출)'
    채움_데이터: 'B 공고의 정량지표 정의를 D에서 그대로 차용 — "상용화" = 협약 기간 내 판매 실적'
    예: 'D 510행 <표>, D 16~17행 정의(국민체감활동·매출 정의 그대로 복붙)'
    규칙: 'B 공고 각주를 D에서 그대로 인용 (예: D 16~17행은 B 243~244행과 일치)'

  - 양식_필드: 'C [붙임 1] 지식재산권 증빙'
    채움_데이터: 'D 1-3 절에 등록 25건·출원 26건·총 51건 명시 (A KB의 등록23/출원18/총59와 차이 — D는 더 최신/누적치)'
    예: 'D 211행'
    규칙: '특허 건수는 사업 시점 기준 누적치로 업데이트 (A KB와 차이 시 D 본문 우선, 출처 갱신 필요)'

  - 양식_필드: 'C 6-1 월단위 추진계획'
    채움_데이터: 'D는 핵심 기술 2개(다중영상 객체탐지 + 열매숙성도 분류)를 별도 ❍로 분리하고 각각 추진계획 표 첨부'
    예: 'D 541~564행 — 표 13, 표 14 라벨'
    규칙: '주요 기술과제를 ❍별로 분해 → 각 ❍ 하위에 월별 일정 표 1개씩'

  - 양식_필드: 'C 7-1 ~ 7-5 지원금 표'
    채움_데이터: '"(인건비 제외)" 마스킹 처리하여 외부 공유본에서 비용 정보 제거'
    예: 'D 파일명 "[2차취합]_사업계획서.txt"는 원본 "(인건비 제외)(공유용)" 표기'
    규칙: '예산표는 최종본·공유본 분리. 공유본은 마스킹.'

