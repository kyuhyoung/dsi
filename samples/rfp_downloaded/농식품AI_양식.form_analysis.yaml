# ────────────────────────────────────────────────────────────
writer_guidance:
  - principle: '각 cell_fill_plan 항목의 fill_from 경로의 KB 데이터를 읽어 해당 셀 위치에 채움.'
  - principle: 'kb_status="확인 필요" 항목은 *"확인 필요"* 마커 그대로 두고 사용자 검토 받기.'
  - principle: 'group_instruction·group_section_header·group_separator 표는 *원본 텍스트 그대로 보존*.'
  - principle: 'table_relations 의 sum/duplicate 관계 *반드시 일치*. 한 표만 수정 시 종속 표도 동기화.'
  - principle: 'table 57 (일정표) 은 협약 시작·종료일 결정 후 작성.'
  - principle: 'table 17·52 의 성과목표는 *동일 값* 사용.'
  - principle: '컨소시엄 미구성 시 table 10·11·12·43·45 비우거나 "해당없음" 표기.'

# ────────────────────────────────────────────────────────────
# 6. builder (md_to_docx) 에 대한 가이드
# ────────────────────────────────────────────────────────────
builder_guidance:
  - principle: 'form.yaml의 cells 좌표·colspan/rowspan 그대로 재현.'
  - principle: '빈 셀(text="")은 placeholder. proposal-writer 출력에서 해당 위치 텍스트 삽입.'
  - principle: 'group_self_diagnosis 의 ○/× 는 단일 문자. 셀 가운데 정렬.'
  - principle: 'table 57 (일정표) 의 r1c2~r1c24 짝수 col 은 월 번호. ●·▲·━ 등 마커는 셀 중앙.'
  - principle: 'group_instruction 표는 *회색 음영* 적용 가능 (선택).'
