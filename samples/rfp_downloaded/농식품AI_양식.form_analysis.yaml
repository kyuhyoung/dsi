# 3. 표 간 관계 (table_relations)
# ────────────────────────────────────────────────────────────
table_relations:

  - sum_relation:
      label: '재무현황 표 = 신청서 기업정보 매출액 일치'
      source: {table_idx: 7, cell_range: 'r5~r8 × col 1,3 (연도별 매출액)'}
      target: {table_idx: 8, cell_range: 'r5 (매출액) × 연도'}
      note: '동일 데이터를 두 표에 기재 — 값 일치 필수.'

  - duplicate_relation:
      label: '성과목표 표 중복 — table 17과 table 52'
      source: {table_idx: 17, cell_range: 'r2~r7 성과목표'}
      target: {table_idx: 52, cell_range: 'r0~r5 성과목표 (동일 구조)'}
      note: '17은 사업비 표 안 통합형, 52는 5-1 단독 표. 값 동일.'

  - sum_relation:
      label: '지원금 총괄 = 자기부담 + 국고'
      source:
        - {table_idx: 62, hint: '자기부담금 합계 (현금+현물)'}
        - {table_idx: 63, hint: '국고지원금 합계'}
      target: {table_idx: 61, cell: {row: 2, col: 0, hint: '지원금 합계'}}
      note: '7-4 (table 64) 가 통합. 종속 관계 강제.'

  - sum_relation:
      label: '지원금 총 상세 = 자기부담 + 국고 (비목별)'
      source:
        - {table_idx: 62, hint: '자기부담 비목별 금액'}
        - {table_idx: 63, hint: '국고 비목별 금액'}
      target: {table_idx: 64, cell_range: '비목별 통합 금액'}

  - sum_relation:
      label: '인건비 표 = 자기부담·국고 인건비 일치'
      source: {table_idx: 66, hint: '인력별 인건비 합계 (A×B×C)'}
      target:
        - {table_idx: 62, hint: '자기부담 인건비 항목'}
        - {table_idx: 63, hint: '국고 인건비 항목'}

  - duplicate_relation:
      label: '컨소시엄 표 = 주관기업 표 구조 동일 (table 7 vs 10, 8 vs 11+12)'
      source: {table_idx: 7, hint: '주관기업 기본정보'}
      target: {table_idx: 10, hint: '참여기업 기본정보'}
      note: '컨소시엄 미구성 시 10·11·12 비움.'

  - fk_relation:
      label: '신청서 종합 (5) — 신청자 정보가 신청서 (7) 와 일치'
      source: {table_idx: 7, hint: '주관기업 대표·연락처'}
