# ────────────────────────────────────────────────────────────
# 6. proposal-writer 가이드
# ────────────────────────────────────────────────────────────
writer_guidance:
  - principle: '각 cell_fill_plan 항목의 fill_from 경로의 KB 데이터를 읽어 해당 셀 위치에 채움.'
  - principle: 'kb_status="확인 필요" 항목은 "확인 필요" 마커 그대로 두고 사용자 검토 받기.'
  - principle: 'instruction·section_header·separator·reference_table 표는 *원본 텍스트 그대로 보존*.'
  - principle: 'table_relations의 sum/duplicate 관계 *반드시 일치*. 한 표 수정 시 종속 표 동기화.'
  - principle: 'table 57 일정표는 협약 시작·종료일 결정 후 작성.'
  - principle: 'table 17·52 성과목표 동일 값 사용.'
  - principle: '컨소시엄 미구성 시 table 10·11·12·43·44 비우거나 "해당없음" 표기.'
  - principle: '진한 박스(#003366) 셀은 *입력 placeholder* — 실제 데이터로 채울 영역. 빌더는 fill 그대로 재현.'
  - principle: 'r1 샘플 행이 있는 표 (table 43·46·47·48·49·85) — 샘플은 *지우고* 실제 데이터로 교체 권장.'

# ────────────────────────────────────────────────────────────
# 7. builder (md_to_docx / hwp 출력) 가이드
# ────────────────────────────────────────────────────────────
builder_guidance:
  - principle: 'form.yaml의 cells 좌표·colspan/rowspan·visual.background_color 그대로 재현.'
  - principle: '빈 셀(text="")은 placeholder. proposal-writer 출력의 해당 위치 텍스트 삽입.'
  - principle: 'self_diagnosis 의 ○/× 단일 문자 — 셀 가운데 정렬.'
  - principle: 'schedule (table 57) 의 월별 셀은 빌더가 fill 보존. 마커(●·▲·━) 삽입 시 셀 중앙.'
  - principle: 'instruction 표(group_instruction) 는 *회색 음영* 적용 가능 (선택).'
  - principle: 'placeholder 진한 박스(#003366) 는 양식 시각 그대로. 텍스트 색은 흰색 또는 밝은 색 권장 (대비).'
