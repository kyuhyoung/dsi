- idx: 75
  rows: 18
  cols: 2
  cells:
  - row: 0
    col: 0
    text: 지원금집행 비목
    colspan: 1
    rowspan: 1
  - row: 0
    col: 1
    text: 세부내용
    colspan: 1
    rowspan: 1
  - row: 1
    col: 0
    text: 인건비
    colspan: 1
    rowspan: 1
  - row: 1
    col: 1
    text: · 협약 기간 중 신규 채용한 인력 및 기존 고용인력에 대해 집행 가능하며, 신규 채용 인력은 협약 종료일 2개월 이전 채용 인력에
      한하여 집행 가능 · 인건비는 ‘고용보험’ 가입 직원에 한하여 집행 가능하며, 지원기업 부담 4대 보험료를 포함하여 집행 가능 · 인건비
      지급 대상인 대표, 사업 총책임자 및 직원은 참여율 100% 한도로 사업 참여율에 따라 지급 가능 · 협약 기간 내 직원별 급여는 ①월급여×②참여기간×③참여율로
      한다.  ① 지원기업의 급여기준에 따른 연봉계약서 총액을 12로 나눈 것단, 연봉 계약체결을 하지 않는(단기 인력 등) 인력의 경우 근로계약서로
      대체할 수 있다.  ② 월 단위만 인정  ③ 정수만 인정(소수점 이하 불인정) · 현물 인정 범위는 사업공고일 전, 상용화 대상과 직접적인
      관련이 있는 업무를 수행하는 기 채용된 인력으로 한하여 인정한다. · 인건비는 총사업비의 50% 이하로 편성해야 함(주관·참여기업 총합)
    colspan: 1
    rowspan: 1
  - row: 2
    col: 1
    text: '· 증빙자료: 선정심의 후 변동사항이 있는 경우 수정제출  ① 4대보험가입확인서(참여인력 전체, 제출 월 기준)  ② 4대보험납부확인서(참여인력
      전체, 납부 월 기준)  ③ 인력별 연봉계약서 또는 근로계약서(전년도 및 협약 당해 연도)  ④ 참여인력 현황(참여율 포함) 및 인력별
      급여 통장 사본  ⑤ 인건비 지출 내역(엑셀파일, 인력별 인건비 산출 산식 포함)  ⑥ 인력별 급여 이체 확인서'
    colspan: 1
    rowspan: 1
  - row: 3
    col: 0
    text: 지급수수료
    colspan: 1
    rowspan: 1
  - row: 3
    col: 1
    text: '· (전문가 활용) 상용화와 연관이 있는 전문가 활용비구분단위금액(원)세부내용특별-400,000~1,000,000○ 국내외 해당분야
      저명인사  - 해당분야 박사 등 최고 전문가  - 전직 장․차관(급) 및 전직 대학총장(급)   - 위와 상당하다고 인정하는 자일반(Ⅰ)1시간300,000○
      해당분야 전문가로 인정되는 자 - 인간문화재, 유명예술인 및 종교인 등 - 전직 4급 이상 국장급 이하 공무원 - 위와 상당하다고 인정하는
      자초과(매시간)150,000일반(Ⅱ)1시간200,000○ 일반강사(Ⅰ) 외의 강사 - 전직 5급 이하 공무원 등 초과(매시간)100,000원고A4
      25행1매당30,000 ○ 건당 최대 100만원 이내 - 미지급 : 목차, 표지, 간지, 참고문헌, 부록, 이미 활용된 원고 등  번역A4
      25행1매당60,000 이내○ 한국어 → 외국어35,000 이내○ 외국어 → 한국어통역1인당500,000∼900,000○ (6시간까지)
      동시통역, 순차통역100,000/시간○ (6시간초과) 동시통역, 순차통역 · (시험·분석) 제품 및 서비스의 시험·분석, 검사 등 상용화를
      위해 요구되는 비용으로 의뢰기관이 정한 기준 또는 실소요 경비로 지급 · (검·인증) 상용화 분야별 법적 근거로 의무 검정 대상, 상용화
      경쟁력 확보를 위한 검정·인증 획득 비용으로 의뢰기관이 정한 기준 또는 실소요 경비로 지급 · (지재권 획득) 상용화 대상 제품 및 서비스의
      특허 출원·등록, 저작권 등의 획득을 위한 비용으로 실소요 경비를 지급한다. 단, 지재권 획득 완료 시점은 협약 기간 이내 및 출원인이
      지원기업의 대표자 또는 법인 명의인 경우로 한정하며, 성공 보수금은 제외한다. · (기술 보호) 기술 임치(갱신) 수수료 · (임차) ①
      제품 및 서비스 상용화를 위한 기기, 장비, 부수 기자재, 사무실의 임차 경비로 차량 임차는 제외하며, 협약 기간 내의 임차비용만 지급
      가능, ② 국민 체감 활동을 제고할 수 있는 박람회·전시회 등 집행계획 작성(AFPRO 등) · (공통) 지급수수료 집행 시, 해외 기관
      및 전문가의 경우 각각 해당기관의 수수료 등 기준, 위 표에 따라 변동환율을 적용한 미화 기준으로 지급'
    colspan: 1
    rowspan: 1
  - row: 4
    col: 1
    text: '· 전문가 활용 증빙자료  ① 전문가 통장사본  ② 전문가 이력카드  ③ 전문가 참여 승낙서  ④ 전문가 활용 결과보고서  ⑤
      이체 확인서 · 원고·번역·통역 증빙자료  ① 계약서(견적서 또는 세금계산서(청구))  ② 거래처 사업자등록증  ③ 결과보고서  ④ 이체
      확인서 또는 세금계산서(영수) · 시험·분석 증빙자료  ① 계약서(견적서 또는 세금계산서(청구)) 또는 접수증(신청서)  ② 거래처 사업자등록증  ③
      의뢰기관이 발급한 결과서  ④ 이체 확인서 또는 세금계산서(영수) · 지재권 획득 증빙자료  ① 계약서(견적서 또는 세금계산서(청구))  ②
      거래처 사업자등록증  ③ 특허 출원, 등록, 저작권 획득 인증 문서  ④ 이체 확인서 또는 세금계산서(영수) · 기술보호 증빙자료  ①
      계약서(견적서 포함 또는 세금계산서(영수))  ② 기술 임치증   ③ 이체 확인서 또는 세금계산서(영수)) · 임차(장비·기자재) 증빙자료  ①
      계약서(장비·기자재: 견적서 또는 세금계산서(청구))  ② 검수조서(증빙사진 포함)  ③ 이체 확인서 또는 세금계산서(영수) · 임차(사무실
      등) 증빙자료  ① 임대차 계약서  ② 임대 공간 증빙사진  ③ 이체 확인서 또는 세금계산서(영수)'
    colspan: 1
    rowspan: 1
  - row: 5
    col: 0
    text: 용역비
    colspan: 1
    rowspan: 1
  - row: 5
    col: 1
    text: · 지원기업이 자체적으로 수행할 수 없는 경우(시제품 제작, 공정개선을 위한 기술개발 등) 외부에 의뢰하고 이에 대한 경비를 지급
      · 상용화 관련, 필요 부분에 한하여 용역을 진행할 수 있으며, 상용화 대상의 원천·핵심기술 또는 제품개발 전체에 대한 용역은 불가 ·
      용역을 수행하는 기업 및 기관은 사업자등록증 상 업태·업종 연관성 또는 관련 경험이 없거나, 지원기업과 이해관계가 있는 경우, 지원기업
      간의 용역 수행 불가 · 용역비 선급금(계약대상에게 지급)은 총 지급액의 50%를 초과할 수 없다 · 용역 산출물이 장치, 장비, S/W인
      경우, 협약 종료 시까지 정상적으로 작동해야 하며, 이를 위해 지원기업은 이와 관련하여 사후 점검 및 수리 등과 관련한 내용을 포함하여
      용역 계약을 체결해야 한다. · 용역 산출물은 협약 종료일로부터 2개월 이전까지 납품 받아야 한다.
