    text: 본 신청기업은 농림축산식품부 소관의 「AI 응용제품 신속상용화 지원사업」을 수행하고자 사업계획서를 제출합니다. 본 사업의 지원대상으로
      선정될 시, 관련 법령 등에서 정한 제반사항을 준수할 것을 약속하고, 제출한 사업 신청 서류에서 허위 사실이 있을 경우, 선정 취소 등
      제재조치 및 관련 사업 참여 제한 등의 조치에 동의합니다. ※ 컨소시엄의 경우, 참여기업 모두 명기 및 날인, 본 페이지는 날인본으로 제출(PDF,
