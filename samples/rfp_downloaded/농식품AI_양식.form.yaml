      개인 간 거래는 불가 · 구축한 시설 및 장비는 협약 종료 시까지 정상적으로 작동해야 하며, 이를 위해 지원기업은 이와 관련하여 사후 점검
      및 수리 등과 관련한 내용을 포함하여 계약을 체결해야 한다. · 구입·구축한 시설 및 장비는 협약 종료일로부터 2개월 이전까지 납품 받아야
