- idx: 60
  rows: 1
  cols: 1
  cells:
  - row: 0
    col: 0
    text: ※ 지원금 구성 및 집행계획은 본 사업공고 [별지 4] 지원금 사용 비목에 따르며, 자기부담금 우선 집행을 원칙으로 함※ 비목별
      집행 기한에 맞춰 계획해야 하며, 최대한도 내에서 실소요 예상 금액으로 작성※ 컨소시엄의 경우 주관기업 및 참여기업 전체의 지원금 구성
      및 집행계획을 각각 작성 및 제출해야 함※ 자기부담금을 제외한 국고지원금 중, 비목별 단일 건 금2,000만원 이상인 경우 및 인건비는
      상세 계획 작성※ 컨소시엄의 참여기업이 집행 가능한 지원금 비목은 인건비, 지급수수료, 재료비, 여비로 한정※ 국민 체감 활동을 제고할
      수 있는 박람회·전시회 등 집행계획 작성(AFPRO 등)
    colspan: 1
    rowspan: 1
