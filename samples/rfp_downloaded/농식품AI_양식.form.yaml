      보유 및 이용기간수집한 정보(개인·법인 등)의 수집 및 이용 목적이 달성된 후에는 해당 정보를 지체 없이 재생이 불가능한 방법으로 파기합니다.
      정보주체의 요청이 있을 경우 동일 방법으로 즉시 파기해야 하며, 개인정보 보유기간은 5년입니다.수집하는 기본 정보 항목성명, 성별, 주소,
      연락처, 이메일 등 제출 서류 및 포함 정보 전체동의 거부 권리 및 동의 거부에 따른 제한사항귀하는 정보 제공 및 동의를 거부할 권리가
      있으며, 거부 시에는 선정심사 및 지원 대상에서 제외될 수 있습니다.정보제공 동의 인원[붙임] 정보제공 동의 인원 목록정보 수집 및 이용에
