    text: · 모든 비목은 지원기업 자기부담금 우선 집행 후 부족분에 대하여 국고지원금을 집행한다. · 지원기업 자기부담금의 현물은 현금을
      제외한 인건비, 시설장비비, 재료비 비목에 해당하는 것을 말한다. · 비목 간 총변동이 금2,000만원 이상인 경우, 용역비 및 시설장비비의
      변경이 있는 경우 추가 운영위원회 심의 후 집행. 단, 자기부담금의 변동은 제외할 수 있음 · 증빙자료는 전담기관이 지정하는 회계기관에
      월별 제출 · 지원기업의 귀책사유로 발생하는 비용은 집행 불가 · 이체확인서 및 세금계산서(영수) 외 카드 영수증으로 대체 가능한 경우
      인정 · 지원금으로 인하여 발생한 이자는 집행 불가하며, 정산 시 반납 · 위 표에서 ‘협약’이란 전담기관과 지원기업 간 협약을 말한다.
